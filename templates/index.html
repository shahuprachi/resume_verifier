<!doctype html>
<html>
  <head>
    <title>AI Resume Verification System</title>

    <style>
      body {
        font-family: Segoe UI;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 400px;
      }

      button {
        background: linear-gradient(45deg, #ff6a00, #ee0979);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>AI Resume Skill Authenticity Verification System</h1>

      <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="resume" />

        <br /><br />

        <button>Upload Resume</button>
      </form>
    </div>
  </body>
</html>
