<!doctype html>
<html>
  <head>
    <title>AI Skill Verification Quiz</title>

    <style>
      body {
        font-family: Segoe UI;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 25px;
        width: 600px;
        box-shadow: 0px 15px 40px rgba(0, 0, 0, 0.3);
        overflow-y: auto;
        max-height: 90vh;
      }

      .question {
        margin-top: 25px;
      }

      button {
        margin-top: 30px;
        padding: 12px 40px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(45deg, #ff512f, #dd2476);
        color: white;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>AI Resume Skill Verification Quiz</h2>

      <form action="/result" method="POST">
        {% for qid, qdata in questions.items() %}

        <div class="question">
          <p><strong>{{ qdata.question }}</strong></p>

          {% for option in qdata.options %}

          <label>
            <input
              type="radio"
              name="{{ qid }}"
              value="{{ option }}"
              required
            />

            {{ option }}
          </label>

          <br />

          {% endfor %}
        </div>

        {% endfor %}

        <button type="submit">Submit Answers</button>
      </form>
    </div>
  </body>
</html>
