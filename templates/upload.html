<!doctype html>
<html>
  <head>
    <style>
      body {
        background: linear-gradient(120deg, #667eea, #764ba2);
        font-family: Segoe UI;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        width: 400px;
        text-align: center;
        box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.3);
      }

      .skill {
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        color: white;
        padding: 10px;
        margin: 8px;
        border-radius: 20px;
      }

      button {
        margin-top: 20px;
        padding: 12px 30px;
        border: none;
        background: #ff4b2b;
        color: white;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Detected Skills</h2>

      {% for skill in skills %}
      <div class="skill">{{ skill }}</div>
      {% endfor %}

      <!-- FIXED BUTTON -->
      <form action="/quiz">
        <button type="submit">Start Skill Verification Test</button>
      </form>
    </div>
  </body>
</html>
